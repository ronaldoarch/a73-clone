<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#4D087B" />
    <link rel="icon" href="https://upload-us.i-j-2-k.com/s5/app-icon/1222508/LOGO.jpg" />
    <link rel="apple-touch-icon" href="https://upload-us.i-j-2-k.com/s5/app-icon/1222508/LOGO.jpg" />
    <title>A73</title>
  </head>
  <body>
    <div id="app-loading" style="position:fixed;inset:0;background:linear-gradient(135deg,#670d98 0%,#640c95 50%,#5B2875 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s">
      <img src="https://upload-us.i-j-2-k.com/s5/app-icon/1222508/LOGO.jpg" alt="" style="width:80px;height:80px;border-radius:16px;margin-bottom:16px;object-fit:contain" onerror="this.style.display='none'" />
      <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:appLoadingSpin 0.8s linear infinite"></div>
      <style>@keyframes appLoadingSpin{to{transform:rotate(360deg)}}</style>
    </div>
    <div id="app"></div>
    <script src="/app-config.js"></script>
    <script>
      (function() {
        var base = (typeof window !== 'undefined' && window.__API_BASE__) ? String(window.__API_BASE__).replace(/\/$/, '') : '';
        fetch(base + '/api/settings').then(function(r) { return r.json(); }).then(function(data) {
          var img = document.querySelector('#app-loading img');
          if (img && data.loadingBanner) {
            var url = data.loadingBanner.startsWith('http') ? data.loadingBanner : base + data.loadingBanner;
            img.src = url;
          }
        }).catch(function() {});
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        window.__hideAppLoading = function() {
          var el = document.getElementById('app-loading');
          if (el) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; setTimeout(function() { el.remove(); }, 300); }
        };
        // Fallback: esconde loading após 10s se o app travar
        setTimeout(function() {
          var el = document.getElementById('app-loading');
          if (el) window.__hideAppLoading && window.__hideAppLoading();
        }, 10000);
      });
    </script>
  </body>
</html>
