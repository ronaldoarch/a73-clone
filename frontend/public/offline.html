<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - A73</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A0F2E;
      color: #E8DFF5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 400px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: rgba(245, 200, 76, 0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #F5C84C; }
    h1 { font-size: 24px; margin-bottom: 12px; color: #F5C84C; }
    p { font-size: 15px; color: rgba(232, 223, 245, 0.7); line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 14px 40px;
      background: linear-gradient(135deg, #F5C84C, #7041F3);
      color: #1A0F2E; font-weight: 700; font-size: 15px;
      border: none; border-radius: 30px; cursor: pointer;
      text-decoration: none; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .spinner {
      display: none; width: 32px; height: 32px;
      margin: 20px auto 0; border: 3px solid rgba(245, 200, 76, 0.3);
      border-top-color: #F5C84C; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spinner.active { display: block; }
    .status { margin-top: 12px; font-size: 13px; color: rgba(232, 223, 245, 0.5); min-height: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Sem Conexão</h1>
    <p>Parece que você está offline. Verifique sua conexão com a internet e tente novamente.</p>
    <button class="btn" onclick="tryReconnect()">Tentar Novamente</button>
    <div id="spinner" class="spinner"></div>
    <div id="status" class="status"></div>
  </div>
  <script>
    async function tryReconnect() {
      const spinner = document.getElementById('spinner')
      const status = document.getElementById('status')
      spinner.classList.add('active')
      status.textContent = 'Verificando conexão...'
      try {
        const resp = await fetch('/', { cache: 'no-store' })
        if (resp.ok) {
          status.textContent = 'Conectado! Redirecionando...'
          setTimeout(() => window.location.reload(), 500)
          return
        }
      } catch {}
      spinner.classList.remove('active')
      status.textContent = 'Ainda sem conexão. Tente novamente.'
    }
  </script>
</body>
</html>
