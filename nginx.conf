server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy /api e /uploads: configure no Coolify (Proxy) ou use docker-compose.
    # Se o backend estiver em outro serviço, adicione no Coolify a rota /api e /uploads.

    # SPA - fallback para index.html em todas as rotas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
