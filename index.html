<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#4D087B" />
    <link rel="icon" href="/assets/logo-35m.svg" />
    <link rel="apple-touch-icon" href="/assets/logo-35m.svg" />
    <title>35m</title>
  </head>
  <body>
    <div id="app-loading" style="position:fixed;inset:0;background:linear-gradient(135deg,#670d98 0%,#640c95 50%,#5B2875 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s">
      <span id="app-loading-brand" style="font-size:2.5rem;font-weight:800;color:#fff;margin-bottom:16px;text-shadow:0 2px 8px rgba(0,0,0,0.3)">35m</span>
      <img id="app-loading-img" src="/assets/logo-35m.svg" alt="" style="width:80px;height:80px;border-radius:16px;margin-bottom:16px;object-fit:contain" onerror="this.style.display='none'" />
      <div id="app-loading-spinner" style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:appLoadingSpin 0.8s linear infinite"></div>
      <style>@keyframes appLoadingSpin{to{transform:rotate(360deg)}}</style>
    </div>
    <div id="app"></div>
    <script src="/app-config.js"></script>
    <script>
      (function() {
        var base = (typeof window !== 'undefined' && window.__API_BASE__) ? String(window.__API_BASE__).replace(/\/$/, '') : '';
        var controller = new AbortController();
        var timeout = setTimeout(function() { controller.abort(); }, 3000);
        fetch(base + '/api/settings', { signal: controller.signal }).then(function(r) { return r.json(); }).then(function(data) {
          clearTimeout(timeout);
          var brand = document.getElementById('app-loading-brand');
          var img = document.getElementById('app-loading-img');
          var spinner = document.getElementById('app-loading-spinner');
          if (brand && data.siteName) brand.textContent = data.siteName;
          if (img && data.loadingBanner) {
            var url = data.loadingBanner.startsWith('http') ? data.loadingBanner : base + data.loadingBanner;
            img.src = url;
            img.style.cssText = 'width:80px;height:80px;border-radius:16px;margin-bottom:16px;object-fit:contain';
            if (spinner) spinner.style.display = 'block';
          }
        }).catch(function() { clearTimeout(timeout); });
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        window.__hideAppLoading = function() {
          var el = document.getElementById('app-loading');
          if (el) { el.style.opacity = '0'; el.style.pointerEvents = 'none'; setTimeout(function() { el.remove(); }, 300); }
        };
        // Fallback: esconde loading após 10s se o app t
        setTimeout(function() {
          var el = document.getElementById('app-loading');
          if (el) window.__hideAppLoading && window.__hideAppLoading();
        }, 10000);
      });
    </script>
  </body>
</html>
